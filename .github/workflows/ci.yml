name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go vet ./...

      - run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: staticcheck ./...

      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - run: go test ./...

      - run: go build -trimpath ./cmd/update-ai-tools
